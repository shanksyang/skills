# 文件分类配置
# 按项目/用途管理文件，每个分类对应 Notion 中的一个标签

# 分类定义
categories:
  # 工作项目
  工作项目:
    description: "工作相关的项目文件"
    tags: ["工作", "项目"]
    icon: "💼"
    subcategories:
      - 需求文档
      - 设计稿
      - 会议纪要
      - 技术方案

  # 学习资料
  学习资料:
    description: "学习和培训相关文件"
    tags: ["学习", "资料"]
    icon: "📚"
    subcategories:
      - 技术书籍
      - 课程笔记
      - 论文
      - 教程

  # 生活记录
  生活记录:
    description: "个人生活相关文件"
    tags: ["生活"]
    icon: "🏠"
    subcategories:
      - 照片
      - 证件
      - 合同
      - 票据

  # 临时文件
  临时文件:
    description: "临时存放的文件"
    tags: ["临时"]
    icon: "📎"

# 文件类型 → 默认分类映射
file_type_defaults:
  # 文档类
  ".pdf": "工作项目"
  ".docx": "工作项目"
  ".doc": "工作项目"
  ".xlsx": "工作项目"
  ".xls": "工作项目"
  ".pptx": "工作项目"
  ".ppt": "工作项目"
  ".txt": "临时文件"
  ".md": "学习资料"

  # 图片类
  ".png": "生活记录"
  ".jpg": "生活记录"
  ".jpeg": "生活记录"
  ".gif": "生活记录"
  ".svg": "工作项目"
  ".webp": "生活记录"

  # 压缩包
  ".zip": "临时文件"
  ".rar": "临时文件"
  ".7z": "临时文件"
  ".tar.gz": "临时文件"

# 大文件阈值（字节）
# Notion API 上传限制为 5MB
large_file_threshold: 5242880  # 5 * 1024 * 1024

# Notion 页面默认属性
notion_defaults:
  domain: "📁文件"           # Notion "领域" 属性值
  title_prefix: ""           # 页面标题前缀
  include_file_info: true    # 是否在页面中包含文件元信息（大小、类型等）
